<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Student Record Management
                </h1>
                <p class="text-slate-400 mt-2">Cloud-Native Web Application</p>
            </div>
            
            <!-- Badges -->
            <div class="flex flex-wrap gap-4">
                <div class="flex items-center gap-2 bg-orange-500/10 text-orange-400 px-3 py-1.5 rounded-full border border-orange-500/20 shadow-[0_0_10px_rgba(249,115,22,0.1)]">
                    <i class="fa-brands fa-aws"></i> EC2 Backend
                </div>
                <div class="flex items-center gap-2 bg-blue-500/10 text-blue-400 px-3 py-1.5 rounded-full border border-blue-500/20 shadow-[0_0_10px_rgba(59,130,246,0.1)]">
                    <i class="fa-solid fa-database"></i> SQLite Database
                </div>
                <div class="flex items-center gap-2 bg-green-500/10 text-green-400 px-3 py-1.5 rounded-full border border-green-500/20 shadow-[0_0_10px_rgba(34,197,94,0.1)]">
                    <i class="fa-solid fa-bucket"></i> S3 Frontend
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add Student Form -->
            <div class="lg:col-span-1">
                <div class="glass-panel rounded-2xl p-6 shadow-xl relative overflow-hidden">
                    <!-- Decorative blur element -->
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500/20 rounded-full blur-3xl"></div>
                    
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-emerald-400 relative z-10">
                        <i class="fa-solid fa-user-plus"></i> Add New Student
                    </h2>
                    <form id="addStudentForm" class="space-y-4 relative z-10">
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Full Name</label>
                            <input type="text" id="name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-white placeholder-slate-500" placeholder="e.g. John Doe">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Roll Number</label>
                            <input type="text" id="roll_no" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-white placeholder-slate-500" placeholder="e.g. CS101">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Marks (Out of 100)</label>
                            <input type="number" id="marks" required min="0" max="100" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-white placeholder-slate-500" placeholder="85">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Grade</label>
                            <select id="grade" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-white">
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-medium py-2.5 rounded-lg transition-all mt-6 flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                            <span>Save Record</span>
                            <i class="fa-solid fa-paper-plane text-sm"></i>
                        </button>
                    </form>
                    <div id="formMessage" class="mt-4 text-sm hidden relative z-10"></div>
                </div>
            </div>

            <!-- Students List -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-2xl p-6 shadow-xl h-full flex flex-col relative overflow-hidden">
                    <!-- Decorative blur element -->
                    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl"></div>
                    
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <h2 class="text-xl font-semibold flex items-center gap-2 text-blue-400">
                            <i class="fa-solid fa-users"></i> Student Records
                        </h2>
                        <div class="text-xs text-slate-400 flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                            <span class="relative flex h-2 w-2">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            Live sync (3s)
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto flex-1 relative z-10 bg-slate-900/40 rounded-xl border border-slate-800">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-700/80 bg-slate-800/40">
                                    <th class="py-4 px-5 font-medium text-sm">ID</th>
                                    <th class="py-4 px-5 font-medium text-sm">Name</th>
                                    <th class="py-4 px-5 font-medium text-sm">Roll No</th>
                                    <th class="py-4 px-5 font-medium text-sm">Marks</th>
                                    <th class="py-4 px-5 font-medium text-sm">Grade</th>
                                    <th class="py-4 px-5 font-medium text-sm text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTableBody">
                                <!-- Data will be populated here -->
                                <tr>
                                    <td colspan="6" class="text-center py-12 text-slate-500">
                                        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500/50"></i>
                                        <p>Connecting to EC2 Backend...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use local backend for testing
        const API_URL = "http://127.0.0.1:5000/students"; 
        
        async function fetchStudents() {
            try {
                const response = await fetch(API_URL);
                const students = await response.json();
                
                const tableBody = document.getElementById('studentsTableBody');
                
                if (students.error) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-400">Error: ${students.error}</td></tr>`;
                    return;
                }
                
                if (students.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center py-12 text-slate-400">
                                <div class="bg-slate-800/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-500">
                                    <i class="fa-solid fa-folder-open text-2xl"></i>
                                </div>
                                <p>No records found. Add a student to get started.</p>
                            </td>
                        </tr>`;
                    return;
                }

                tableBody.innerHTML = students.map((student, index) => `
                    <tr class="border-b border-slate-800 hover:bg-slate-800/60 transition-colors animate-fade-in" style="animation-delay: ${index * 50}ms">
                        <td class="py-4 px-5 text-slate-400">#${student.id}</td>
                        <td class="py-4 px-5 font-medium text-slate-200">${student.name}</td>
                        <td class="py-4 px-5 font-mono text-sm text-slate-400 bg-slate-800/30 rounded inline-block mt-3 ml-5">${student.roll_no}</td>
                        <td class="py-4 px-5">
                            <div class="flex items-center gap-3">
                                <span class="text-slate-300 w-6">${student.marks}</span>
                                <div class="w-24 h-2 bg-slate-800 rounded-full overflow-hidden">
                                    <div class="h-full ${student.marks >= 80 ? 'bg-emerald-500' : student.marks >= 60 ? 'bg-blue-500' : student.marks >= 40 ? 'bg-yellow-500' : 'bg-red-500'} shadow-[0_0_10px_currentColor]" style="width: ${student.marks}%"></div>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-5">
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold border
                                ${student.grade === 'A' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 
                                  student.grade === 'B' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 
                                  student.grade === 'C' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' : 
                                  'bg-red-500/10 text-red-400 border-red-500/20'}">
                                ${student.grade}
                            </span>
                        </td>
                        <td class="py-4 px-5 text-right">
                            <button onclick="deleteStudent(${student.id})" class="text-red-400/70 hover:text-red-400 hover:bg-red-400/10 p-2 rounded-lg transition-all" title="Delete record">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error("Failed to fetch students", error);
                document.getElementById('studentsTableBody').innerHTML = `
                    <tr><td colspan="6" class="text-center py-12 text-red-400/80 bg-red-500/5">
                        <i class="fa-solid fa-triangle-exclamation mb-3 text-3xl"></i><br>
                        <span class="font-medium">Could not connect to backend API.</span><br>
                        <span class="text-sm text-red-400/60 mt-1 inline-block">Make sure Flask is running on EC2 and CORS is enabled.</span>
                    </td></tr>
                `;
            }
        }

        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;
            
            const studentData = {
                name: document.getElementById('name').value,
                roll_no: document.getElementById('roll_no').value,
                marks: parseInt(document.getElementById('marks').value),
                grade: document.getElementById('grade').value
            };
            
            const msgEl = document.getElementById('formMessage');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                
                if (response.ok) {
                    msgEl.className = "mt-4 text-sm text-emerald-400 block p-3 bg-emerald-500/10 rounded-lg border border-emerald-500/20";
                    msgEl.innerHTML = '<i class="fa-solid fa-check-circle"></i> Student added successfully!';
                    document.getElementById('addStudentForm').reset();
                    fetchStudents(); // Refresh immediately
                    setTimeout(() => msgEl.classList.add('hidden'), 4000);
                } else {
                    const data = await response.json();
                    msgEl.className = "mt-4 text-sm text-red-400 block p-3 bg-red-500/10 rounded-lg border border-red-500/20";
                    msgEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${data.error || 'Failed to add student'}`;
                }
            } catch (error) {
                msgEl.className = "mt-4 text-sm text-red-400 block p-3 bg-red-500/10 rounded-lg border border-red-500/20";
                msgEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Network error. Backend unreachable.`;
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
            }
        });

        async function deleteStudent(id) {
            if(!confirm('Are you sure you want to delete this record?')) return;
            
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    fetchStudents(); // Refresh immediately
                } else {
                    alert('Failed to delete student');
                }
            } catch (error) {
                alert('Network error. Backend unreachable.');
            }
        }

        // Add some basic CSS animation
        document.head.insertAdjacentHTML('beforeend', `
            <style>
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                .animate-fade-in {
                    animation: fadeIn 0.4s ease-out forwards;
                    opacity: 0;
                }
            </style>
        `);

        // Initial fetch
        fetchStudents();
        
        // Fetch every 3 seconds
        setInterval(fetchStudents, 3000);
    </script>
</body>
</html>
